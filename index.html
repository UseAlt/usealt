<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALT - Find the Best Price</title>

<style>
html{
scroll-behavior:smooth;
}

body{
font-family: Arial;
margin:0;
background:#fff;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
border-bottom:1px solid #eee;
position:sticky;
top:0;
background:white;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:bold;
}

/* MENU BUTTONS */
.menu button{
margin-left:15px;
background:none;
border:none;
font-size:14px;
cursor:pointer;
}

.menu button:hover{
text-decoration:underline;
}

/* HERO */
.hero{
text-align:center;
margin-top:40px;
}

input{
padding:12px;
width:300px;
font-size:16px;
}

button{
padding:10px;
border:none;
cursor:pointer;
}

.search-btn{
background:black;
color:white;
margin-left:10px;
}

.amazon-btn{
background:orange;
margin-top:15px;
}

/* RESULTS */
.results{
width:80%;
margin:auto;
margin-top:30px;
}

.card{
display:flex;
gap:15px;
border:1px solid #ddd;
padding:15px;
margin-bottom:15px;
align-items:center;
}

.card img{
width:100px;
}

.view-btn{
background:black;
color:white;
}

/* SECTIONS */
.section{
padding:60px 20px;
text-align:center;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">ALT</div>

<div class="menu">
<button onclick="scrollToSection('home')">Home</button>
<button onclick="scrollToSection('about')">About</button>
<button onclick="scrollToSection('contact')">Contact</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="hero">

<h1>Find the Best Price Instantly</h1>

<input id="searchInput" placeholder="Search product...">
<button class="search-btn" onclick="search()">Search</button>

<div id="amazonContainer"></div>

</div>

<!-- RESULTS -->
<div class="results" id="results"></div>

<!-- ABOUT -->
<div id="about" class="section">
<h2>About ALT</h2>
<p>ALT helps you find the best price and fastest delivery instantly across retailers.</p>
</div>

<!-- CONTACT -->
<div id="contact" class="section">
<h2>Contact</h2>
<p>Email: alt@support.com</p>
</div>

<script>

// MENU SCROLL FUNCTION
function scrollToSection(id){
document.getElementById(id).scrollIntoView({
behavior: "smooth"
})
}

// SEARCH FUNCTION
async function search(){

const query = document.getElementById("searchInput").value

// AMAZON BUTTON
document.getElementById("amazonContainer").innerHTML = `
<a href="https://www.amazon.co.uk/s?k=${query.replace(/ /g,"+")}" target="_blank">
<button class="amazon-btn">View on Amazon</button>
</a>
`

// FETCH FROM BACKEND
const res = await fetch(`http://localhost:3000/search?q=${query}`)
const data = await res.json()

const results = document.getElementById("results")
results.innerHTML = ""

// DISPLAY RESULTS
data.forEach(item => {

results.innerHTML += `
<div class="card">

<img src="${item.image}">

<div style="flex:1">
<h3>${item.title}</h3>
<p><strong>£${item.price}</strong></p>
<p>${item.delivery}</p>
</div>

<a href="${item.url}" target="_blank">
<button class="view-btn">View Deal</button>
</a>

</div>
`
})

}

</script>

</body>
</html>
