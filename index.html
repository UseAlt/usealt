<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALT - Find the Best Price</title>

<style>
body{
font-family: Arial;
margin:0;
background:#fff;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
border-bottom:1px solid #eee;
}

.logo{
font-size:22px;
font-weight:bold;
}

.menu a{
margin-left:20px;
text-decoration:none;
color:black;
font-size:14px;
}

/* HERO */
.hero{
text-align:center;
margin-top:40px;
}

.search-box{
margin-top:20px;
}

input{
padding:12px;
width:300px;
font-size:16px;
}

button{
padding:12px 20px;
font-size:16px;
cursor:pointer;
border:none;
}

.search-btn{
background:black;
color:white;
}

/* AMAZON BUTTON */
.amazon-btn{
background:orange;
margin-top:15px;
}

/* RESULTS */
.results{
width:80%;
margin:auto;
margin-top:30px;
}

.card{
display:flex;
gap:15px;
border:1px solid #ddd;
padding:15px;
margin-bottom:15px;
align-items:center;
}

.card img{
width:100px;
}

.view-btn{
background:black;
color:white;
padding:10px;
text-decoration:none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">ALT</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</div>
</div>

<!-- HERO -->
<div class="hero">
<h1>Find the Best Price Instantly</h1>

<div class="search-box">
<input id="searchInput" placeholder="Search product...">
<button class="search-btn" onclick="search()">Search</button>
</div>

<div id="amazonContainer"></div>
</div>

<!-- RESULTS -->
<div class="results" id="results"></div>

<script>
async function search(){

const query = document.getElementById("searchInput").value

// AMAZON BUTTON
document.getElementById("amazonContainer").innerHTML = `
<a href="https://www.amazon.co.uk/s?k=${query.replace(/ /g,"+")}" target="_blank">
<button class="amazon-btn">View on Amazon</button>
</a>
`

// FETCH BACKEND
const res = await fetch(`http://localhost:3000/search?q=${query}`)
const data = await res.json()

const results = document.getElementById("results")
results.innerHTML = ""

// SHOW RESULTS
data.forEach(item => {

results.innerHTML += `
<div class="card">

<img src="${item.image}">

<div style="flex:1">
<h3>${item.title}</h3>
<p><strong>£${item.price}</strong></p>
<p>${item.delivery}</p>
</div>

<a href="${item.url}" target="_blank">
<button class="view-btn">View Deal</button>
</a>

</div>
`
})

}
</script>

</body>
</html>
