<!DOCTYPE html>
<html>
<head>
<title>UseALT</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f5f5;
text-align:center;
}

.header{
padding:30px 0;
font-size:40px;
font-weight:bold;
}

.hero{
margin-top:120px;
}

.search-box{
margin-top:20px;
}

input{
width:400px;
padding:15px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:12px 25px;
font-size:16px;
border:none;
border-radius:6px;
background:#0077ff;
color:white;
cursor:pointer;
}

.results{
margin-top:120px;
}

table{
margin:auto;
border-collapse:collapse;
}

td,th{
padding:12px 20px;
border-bottom:1px solid #ddd;
}

.highlight{
margin-top:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">
UseALT
</div>

<div class="hero">

<div class="search-box">
<input type="text" placeholder="Search for a product">
</div>

<p>Compare prices and delivery times across retailers in seconds.</p>

<button>Install Extension</button>

</div>

<div class="results">

<h2>Example comparison</h2>

<p>Product: iPhone 15</p>

<table>

<tr>
<th>Retailer</th>
<th>Price</th>
<th>Delivery</th>
</tr>

<tr>
<td>Amazon</td>
<td>£799</td>
<td>Tomorrow</td>
</tr>

<tr>
<td>Currys</td>
<td>£789</td>
<td>2 days</td>
</tr>

<tr>
<td>Argos</td>
<td>£799</td>
<td>Today</td>
</tr>

</table>

<div class="highlight">
💰 Cheapest: Currys<br>
⚡ Fastest: Argos
</div>

</div>

</body>

</html>
