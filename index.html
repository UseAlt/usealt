<!DOCTYPE html>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f5f5;
text-align:center;
}

/* HEADER BAR */

.header{
position:fixed;
top:0;
width:100%;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
padding:15px 0;
font-size:28px;
font-weight:bold;
z-index:1000;
}

/* MENU BUTTON */

.menu-btn{
position:absolute;
left:20px;
top:15px;
font-size:28px;
cursor:pointer;
}

/* SIDE MENU */

.side-menu{
height:100%;
width:0;
position:fixed;
top:0;
left:0;
background:#111;
overflow-x:hidden;
transition:0.3s;
padding-top:60px;
}

.close-btn{
position:absolute;
top:15px;
right:25px;
font-size:35px;
cursor:pointer;
color:white;
}

.side-menu a{
padding:12px 25px;
text-decoration:none;
font-size:20px;
color:white;
display:block;
}

.side-menu a:hover{
background:#333;
}

/* HERO SECTION */

.hero{
margin-top:160px;
}

.search-container{
display:flex;
justify-content:center;
margin-top:20px;
}

.search-container input{
width:500px;
padding:16px;
font-size:18px;
border-radius:30px 0 0 30px;
border:1px solid #ccc;
outline:none;
}

.search-btn{
padding:16px 20px;
font-size:18px;
border:none;
border-radius:0 30px 30px 0;
background:#0077ff;
color:white;
cursor:pointer;
}

/* INSTALL BUTTON */

.install-btn{
margin-top:25px;
padding:14px 30px;
font-size:16px;
border:none;
border-radius:8px;
background:#0077ff;
color:white;
cursor:pointer;
}

/* RESULTS */

.results{
margin-top:120px;
}

table{
margin:auto;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

th{
background:#0077ff;
color:white;
padding:15px 25px;
}

td{
padding:15px 25px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f0f6ff;
}

.summary{
margin-top:20px;
font-weight:bold;
font-size:18px;
}

</style>

</head>
