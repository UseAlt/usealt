<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALT - Find the Best Price</title>

<style>
body{
font-family: Arial;
background:#fff;
margin:0;
text-align:center;
}

h1{
margin-top:40px;
}

.search-box{
margin:20px;
}

input{
padding:12px;
width:300px;
font-size:16px;
}

button{
padding:12px 20px;
font-size:16px;
cursor:pointer;
border:none;
}

.search-btn{
background:black;
color:white;
}

.amazon-btn{
background:orange;
color:black;
margin-bottom:20px;
}

.results{
width:80%;
margin:auto;
margin-top:20px;
}

.card{
display:flex;
align-items:center;
gap:15px;
border:1px solid #ddd;
padding:15px;
margin-bottom:15px;
text-align:left;
}

.card img{
width:100px;
}

.card h3{
margin:0;
font-size:16px;
}

.card p{
margin:5px 0;
}

.view-btn{
background:black;
color:white;
padding:10px;
text-decoration:none;
}

</style>
</head>

<body>

<h1>Find the Best Price Instantly</h1>

<div class="search-box">
<input id="searchInput" placeholder="Search product...">
<button class="search-btn" onclick="search()">Search</button>
</div>

<div id="amazonContainer"></div>

<div class="results" id="results"></div>

<script>

async function search(){

const query = document.getElementById("searchInput").value

// AMAZON BUTTON
const amazonLink = `
<a href="https://www.amazon.co.uk/s?k=${query.replace(/ /g,"+")}" target="_blank">
<button class="amazon-btn">View on Amazon</button>
</a>
`

document.getElementById("amazonContainer").innerHTML = amazonLink

// FETCH FROM BACKEND
const res = await fetch(`http://localhost:3000/search?q=${query}`)
const data = await res.json()

const resultsContainer = document.getElementById("results")
resultsContainer.innerHTML = ""

// DISPLAY RESULTS
data.forEach(item => {

const card = `
<div class="card">

<img src="${item.image}">

<div style="flex:1">
<h3>${item.title}</h3>
<p><strong>£${item.price}</strong></p>
<p>${item.delivery}</p>
</div>

<a href="${item.url}" target="_blank">
<button class="view-btn">View Deal</button>
</a>

</div>
`

resultsContainer.innerHTML += card

})

}

</script>

</body>
</html>
