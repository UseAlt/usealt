<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALT - Find the Best Price</title>

<style>
html{
scroll-behavior:smooth;
}

body{
font-family: Arial, sans-serif;
margin:0;
background:#f8f8f8;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:white;
border-bottom:1px solid #eee;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:bold;
}

.menu button{
margin-left:15px;
background:none;
border:none;
cursor:pointer;
font-size:14px;
}

/* HERO */
.hero{
text-align:center;
padding:40px 20px;
background:white;
}

input{
padding:12px;
width:300px;
font-size:16px;
border:1px solid #ddd;
border-radius:6px;
}

.search-btn{
padding:12px 20px;
margin-left:10px;
background:black;
color:white;
border-radius:6px;
}

/* AMAZON */
.amazon-btn{
background:orange;
margin-top:15px;
padding:10px 20px;
border-radius:6px;
}

/* SORT BAR */
.sort-bar{
text-align:center;
margin-top:20px;
}

.sort-bar button{
margin:5px;
padding:8px 15px;
border-radius:6px;
border:1px solid #ddd;
background:white;
cursor:pointer;
}

/* RESULTS */
.results{
width:85%;
margin:auto;
margin-top:30px;
}

/* CARD */
.card{
display:flex;
gap:15px;
background:white;
border-radius:10px;
padding:15px;
margin-bottom:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.05);
align-items:center;
}

.card img{
width:100px;
border-radius:6px;
}

.view-btn{
background:black;
color:white;
padding:10px;
border-radius:6px;
}

/* BEST DEAL */
.best{
color:green;
font-weight:bold;
}

/* SECTIONS */
.section{
padding:60px 20px;
text-align:center;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">ALT</div>

<div class="menu">
<button onclick="scrollToSection('home')">Home</button>
<button onclick="scrollToSection('about')">About</button>
<button onclick="scrollToSection('contact')">Contact</button>
</div>
</div>

<!-- HERO -->
<div id="home" class="hero">

<h1>Find the Best Price Instantly</h1>

<input id="searchInput" placeholder="Search product...">
<button class="search-btn" onclick="search()">Search</button>

<div id="amazonContainer"></div>

</div>

<!-- SORT -->
<div class="sort-bar">
<button onclick="sortResults('best')">Best</button>
<button onclick="sortResults('price')">Cheapest</button>
<button onclick="sortResults('delivery')">Fastest</button>
</div>

<!-- RESULTS -->
<div class="results" id="results"></div>

<!-- ABOUT -->
<div id="about" class="section">
<h2>About ALT</h2>
<p>ALT helps you find the best price and fastest delivery instantly.</p>
</div>

<!-- CONTACT -->
<div id="contact" class="section">
<h2>Contact</h2>
<p>Email: alt@support.com</p>
</div>

<script>

let currentResults = []

function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"})
}

async function search(){

const query = document.getElementById("searchInput").value

// AMAZON BUTTON
document.getElementById("amazonContainer").innerHTML = `
<a href="https://www.amazon.co.uk/s?k=${query.replace(/ /g,"+")}" target="_blank">
<button class="amazon-btn">View on Amazon</button>
</a>
`

const res = await fetch(`http://localhost:3000/search?q=${query}`)
const data = await res.json()

currentResults = data

displayResults(data)

}

function sortResults(type){

let sorted = [...currentResults]

if(type === "price"){
sorted.sort((a,b)=> a.price - b.price)
}

if(type === "delivery"){
sorted.sort((a,b)=>{
const aDays = parseInt(a.delivery) || 999
const bDays = parseInt(b.delivery) || 999
return aDays - bDays
})
}

if(type === "best"){
sorted.sort((a,b)=> a.score - b.score)
}

displayResults(sorted)

}

function displayResults(data){

const results = document.getElementById("results")
results.innerHTML = ""

data.forEach(item => {

results.innerHTML += `
<div class="card">

<img src="${item.image}">

<div style="flex:1">
<h3>${item.title}</h3>

${item.best ? '<p class="best">⭐ BEST DEAL</p>' : ''}

<p><strong>£${item.price}</strong></p>
<p>${item.delivery}</p>
</div>

<a href="${item.url}" target="_blank">
<button class="view-btn">View Deal</button>
</a>

</div>
`

})

}

</script>

</body>
</html>
