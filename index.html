<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>UseALT</title>

<style>

body{
font-family: Arial;
margin:0;
background:#ffffff;
color:#000;
text-align:center;
}

header{
background:#000;
color:#fff;
padding:15px;
font-size:22px;
}

.search-area{
margin-top:60px;
}

input{
width:400px;
padding:12px;
font-size:16px;
}

button{
padding:12px 20px;
font-size:16px;
cursor:pointer;
background:black;
color:white;
border:none;
}

table{
margin:40px auto;
border-collapse:collapse;
width:80%;
}

th, td{
padding:12px;
border-bottom:1px solid #ddd;
}

th{
background:#000;
color:#fff;
}

a{
color:black;
font-weight:bold;
}

</style>
</head>


<body>

<header>
UseALT
</header>

<div class="search-area">

<h2>Compare prices and delivery times</h2>

<input id="searchInput" placeholder="Search product">

<button onclick="searchProducts()">Search</button>

</div>

<table id="results">

<tr>
<th>Retailer</th>
<th>Price</th>
<th>Delivery</th>
<th>Deal</th>
</tr>

</table>


<script>

async function searchProducts(){

const query = document.getElementById("searchInput").value

if(!query){
alert("Enter a product to search")
return
}

const response = await fetch("http://localhost:3000/search?q=" + query)

const data = await response.json()

const table = document.getElementById("results")

table.innerHTML = `
<tr>
<th>Retailer</th>
<th>Price</th>
<th>Delivery</th>
<th>Deal</th>
</tr>
`

data.forEach(item => {

table.innerHTML += `
<tr>
<td>${item.retailer}</td>
<td>£${item.price}</td>
<td>${item.delivery}</td>
<td><a href="${item.url}" target="_blank">View Deal</a></td>
</tr>
`

})

}

</script>

</body>
</html>
