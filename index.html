<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALT - The Alternative Way to Shop</title>

<style>
html{scroll-behavior:smooth;}
body{font-family:Arial;margin:0;background:#fff;}

.header{
display:flex;
justify-content:space-between;
padding:20px 40px;
border-bottom:1px solid #eee;
position:sticky;
top:0;
background:white;
}

.logo{font-size:24px;font-weight:bold;}

.menu button{
margin-left:20px;
background:none;
border:none;
cursor:pointer;
}

.hero{text-align:center;margin-top:60px;}

input{padding:12px;width:280px;}
button{padding:10px;border:none;cursor:pointer;}

.search-btn{background:black;color:white;}
.amazon-btn{background:orange;margin-top:10px;}

.results{width:85%;margin:auto;margin-top:40px;}

.highlight{
border:2px solid black;
padding:15px;
margin-bottom:20px;
}

.badge{
font-size:12px;
padding:4px 8px;
background:black;
color:white;
display:inline-block;
margin-bottom:5px;
}

.card{
display:flex;
gap:20px;
border:1px solid #ddd;
padding:15px;
margin-bottom:15px;
}

.card img{width:100px;}

.view-btn{background:black;color:white;}

.section{padding:80px;text-align:center;}
</style>
</head>

<body>

<div class="header">
<div class="logo">ALT</div>
<div class="menu">
<button onclick="scrollToSection('home')">Home</button>
<button onclick="scrollToSection('about')">About</button>
<button onclick="scrollToSection('contact')">Contact</button>
</div>
</div>

<div id="home" class="hero">
<h1>Compare prices and delivery in seconds</h1>

<input id="searchInput" placeholder="Search product...">
<button class="search-btn" onclick="search()">Search</button>

<div id="amazonContainer"></div>
</div>

<div id="results" class="results"></div>

<div id="about" class="section">
<h2>About ALT</h2>
<p>Find the best price AND fastest delivery.</p>
</div>

<div id="contact" class="section">
<h2>Contact</h2>
<p>Email: alt@support.com</p>
</div>

<script>

// SCROLL
function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"})
}

// DELIVERY PARSE
function getDeliveryDays(delivery){
if(!delivery) return 5
const match = delivery.match(/\d+/)
return match ? parseInt(match[0]) : 5
}

// CLEAN TITLE (REMOVE SPAM WORDS)
function cleanTitle(title){
return title
.replace(/new|brand new|fast|delivery|sale/gi,"")
.trim()
}

// GROUP SIMILAR PRODUCTS
function groupProducts(data){

const groups = {}

data.forEach(item=>{
const key = cleanTitle(item.title).slice(0,40)

if(!groups[key]){
groups[key] = item
}else{
if(item.price < groups[key].price){
groups[key] = item
}
}
})

return Object.values(groups)
}

// SEARCH
async function search(){

const query = document.getElementById("searchInput").value

document.getElementById("amazonContainer").innerHTML = `
<a href="https://www.amazon.co.uk/s?k=${query.replace(/ /g,"+")}" target="_blank">
<button class="amazon-btn">View on Amazon</button>
</a>
`

const res = await fetch(`http://localhost:3000/search?q=${query}`)
let data = await res.json()

if(!data.length){
document.getElementById("results").innerHTML = "No results"
return
}

// GROUP PRODUCTS
data = groupProducts(data)

// FIND CHEAPEST
const cheapest = [...data].sort((a,b)=>a.price-b.price)[0]

// FIND FASTEST
const fastest = [...data].sort((a,b)=>getDeliveryDays(a.delivery)-getDeliveryDays(b.delivery))[0]

// BEST SCORE
data.forEach(item=>{
item.score = item.price + (getDeliveryDays(item.delivery)*5)
})

const best = [...data].sort((a,b)=>a.score-b.score)[0]

// HTML
let html = ""

html += highlightCard(best,"⭐ Best Overall")
html += highlightCard(cheapest,"💸 Cheapest")
html += highlightCard(fastest,"⚡ Fastest")

data.forEach(item=>{
html += productCard(item)
})

document.getElementById("results").innerHTML = html
}

// COMPONENTS
function highlightCard(item,label){
return `
<div class="highlight">
<div class="badge">${label}</div>
<div class="card">
<img src="${item.image}">
<div style="flex:1">
<h3>${item.title}</h3>
<p><strong>£${item.price}</strong></p>
<p>${item.delivery}</p>
</div>
<a href="${item.url}" target="_blank">
<button class="view-btn">View Deal</button>
</a>
</div>
</div>
`
}

function productCard(item){
return `
<div class="card">
<img src="${item.image}">
<div style="flex:1">
<h3>${item.title}</h3>
<p><strong>£${item.price}</strong></p>
<p>${item.delivery}</p>
</div>
<a href="${item.url}" target="_blank">
<button class="view-btn">View Deal</button>
</a>
</div>
`
}

</script>

</body>
</html>
