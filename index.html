<!DOCTYPE html>
<html>
<head>
<title>UseALT</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f5f5;
text-align:center;
}

.header{
position:fixed;
top:0;
width:100%;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
padding:15px 0;
font-size:28px;
font-weight:bold;
z-index:1000;
}

.menu-btn{
position:absolute;
left:20px;
top:15px;
font-size:28px;
cursor:pointer;
}

.side-menu{
height:100%;
width:0;
position:fixed;
top:0;
left:0;
background:#111;
overflow-x:hidden;
transition:0.3s;
padding-top:60px;
}

.close-btn{
position:absolute;
top:15px;
right:25px;
font-size:35px;
cursor:pointer;
color:white;
}

.side-menu a{
padding:12px 25px;
text-decoration:none;
font-size:20px;
color:white;
display:block;
}

.side-menu a:hover{
background:#333;
}

.hero{
margin-top:160px;
}

.search-container{
display:flex;
justify-content:center;
margin-top:20px;
}

.search-container input{
width:500px;
padding:16px;
font-size:18px;
border-radius:30px 0 0 30px;
border:1px solid #ccc;
outline:none;
}

.search-btn{
padding:16px 20px;
font-size:18px;
border:none;
border-radius:0 30px 30px 0;
background:#0077ff;
color:white;
cursor:pointer;
}

.install-btn{
margin-top:25px;
padding:14px 30px;
font-size:16px;
border:none;
border-radius:8px;
background:#0077ff;
color:white;
cursor:pointer;
}

.results{
margin-top:120px;
}

table{
margin:auto;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

th{
background:#0077ff;
color:white;
padding:15px 25px;
}

td{
padding:15px 25px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f0f6ff;
}

.summary{
margin-top:20px;
font-weight:bold;
font-size:18px;
}

</style>

</head>

<body>

<div class="header">
<span class="menu-btn" onclick="openMenu()">☰</span>
UseALT
</div>

<div id="menu" class="side-menu">

<span class="close-btn" onclick="closeMenu()">×</span>

<a href="#">Home</a>
<a href="#">Search</a>
<a href="#">Install Extension</a>
<a href="#">How ALT Works</a>
<a href="#">About</a>

</div>

<div class="hero">

<div class="search-container">
<input id="searchInput" type="text" placeholder="Search products (e.g. iPhone 15)">
<button class="search-btn" onclick="searchProduct()">🔍</button>
</div>

<p>Compare prices and delivery times across retailers in seconds.</p>

<button class="install-btn">Install Extension</button>

</div>

<div class="results">

<h2>Example comparison</h2>

<p id="productTitle">Product: iPhone 15</p>

<table>

<tr>
<th>Retailer</th>
<th>Price</th>
<th>Delivery</th>
</tr>

<tr>
<td>Amazon</td>
<td>£799</td>
<td>Tomorrow</td>
</tr>

<tr>
<td>Currys</td>
<td>£789</td>
<td>2 days</td>
</tr>

<tr>
<td>Argos</td>
<td>£799</td>
<td>Today</td>
</tr>

</table>

<div class="summary">
💰 Cheapest: Currys<br>
⚡ Fastest: Argos
</div>

</div>

<script>

function openMenu(){
document.getElementById("menu").style.width="250px";
}

function closeMenu(){
document.getElementById("menu").style.width="0";
}

function searchProduct(){
let product = document.getElementById("searchInput").value;

if(product !== ""){
document.getElementById("productTitle").innerText = "Product: " + product;
}

}

</script>

</body>
</html>
