<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>ALT - Find the Best Price Instantly</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
margin:0;
background:#ffffff;
color:#000;
}

/* NAVBAR */

nav{
background:#000;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
}

nav h1{
margin:0;
font-size:22px;
}

nav ul{
list-style:none;
display:flex;
gap:25px;
margin:0;
padding:0;
}

nav a{
color:#fff;
text-decoration:none;
font-weight:bold;
}

/* HERO SECTION */

.hero{
text-align:center;
padding:80px 20px;
}

.hero h2{
font-size:40px;
margin-bottom:25px;
}

/* SEARCH BAR */

.searchBox{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:30px;
}

.searchBox input{
padding:12px;
width:350px;
font-size:16px;
border:1px solid #ccc;
}

.searchBox button{
padding:12px 20px;
background:#000;
color:#fff;
border:none;
font-size:16px;
cursor:pointer;
}

/* INSTALL BUTTON */

.install{
background:#69c14f;
color:#fff;
border:none;
padding:15px 30px;
font-size:18px;
cursor:pointer;
margin-bottom:40px;
}

/* RESULTS */

.results{
width:80%;
margin:auto;
margin-top:40px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#000;
color:#fff;
padding:12px;
}

td{
border:1px solid #ddd;
padding:12px;
text-align:center;
}

/* DEAL BUTTON */

.viewDeal{
background:#000;
color:#fff;
padding:8px 16px;
text-decoration:none;
font-size:14px;
}

/* FOOTER */

footer{
margin-top:80px;
padding:30px;
background:#000;
color:#fff;
text-align:center;
}

</style>

</head>


<body>


<!-- NAVBAR -->

<nav>

<h1>ALT</h1>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">How it Works</a></li>
<li><a href="#">Extension</a></li>
<li><a href="#">About</a></li>
</ul>

</nav>



<!-- HERO -->

<section class="hero">

<h2>Find the Best Price Instantly</h2>

<div class="searchBox">

<input id="searchInput" placeholder="Search product...">

<button onclick="searchProduct()">Search</button>

</div>

<button class="install">Install ALT Extension</button>

</section>



<!-- RESULTS -->

<section class="results">

<table id="resultsTable">

<tr>
<th>Retailer</th>
<th>Price</th>
<th>Delivery</th>
<th>Deal</th>
</tr>

</table>

</section>



<!-- FOOTER -->

<footer>

<p>© ALT Price Comparison</p>

</footer>



<script>

/* SEARCH FUNCTION CONNECTED TO BACKEND */

async function searchProduct(){

const query = document.getElementById("searchInput").value

const response = await fetch("http://localhost:3000/search",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({product:query})

})

const data = await response.json()

const table = document.getElementById("resultsTable")

table.innerHTML = `
<tr>
<th>Retailer</th>
<th>Price</th>
<th>Delivery</th>
<th>Deal</th>
</tr>
`

data.results.forEach(item=>{

table.innerHTML += `
<tr>
<td>${item.retailer}</td>
<td>£${item.price}</td>
<td>${item.delivery}</td>
<td><a class="viewDeal" href="${item.link}" target="_blank">View Deal</a></td>
</tr>
`

})

}

</script>


</body>
</html>
