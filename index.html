<!DOCTYPE html>
<html>
<head>
<title>UseALT</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f5f5;
text-align:center;
}

/* HEADER */

.header{
position:fixed;
top:0;
width:100%;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
padding:15px 0;
font-size:28px;
font-weight:bold;
z-index:1000;
}

/* MENU BUTTON */

.menu-btn{
position:absolute;
left:20px;
top:15px;
font-size:28px;
cursor:pointer;
}

/* SIDE MENU */

.side-menu{
height:100%;
width:0;
position:fixed;
top:0;
left:0;
background:#111;
overflow-x:hidden;
transition:0.3s;
padding-top:60px;
}

.side-menu a{
padding:12px 25px;
text-decoration:none;
font-size:20px;
color:white;
display:block;
}

.side-menu a:hover{
background:#333;
}

/* CLOSE BUTTON */

.close-btn{
position:absolute;
top:15px;
right:25px;
font-size:35px;
cursor:pointer;
color:white;
}

/* HERO */

.hero{
margin-top:160px;
}

/* SEARCH BAR */

.search-container{
display:flex;
justify-content:center;
margin-top:20px;
}

.search-container input{
width:500px;
padding:16px;
font-size:18px;
border-radius:30px 0 0 30px;
border:1px solid #ccc;
outline:none;
}

.search-btn{
padding:16px 20px;
font-size:18px;
border:none;
border-radius:0 30px 30px 0;
background:#0077ff;
color:white;
cursor:pointer;
}

/* INSTALL BUTTON */

.install-btn{
margin-top:25px;
padding:14px 30px;
font-size:16px;
border:none;
border-radius:8px;
background:#0077ff;
color:white;
cursor:pointer;
}

/* RESULTS */

.results{
margin-top:120px;
}

table{
margin:auto;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

th{
background:#0077ff;
color:white;
padding:15px 25px;
}

td{
padding:15px 25px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f0f6ff;
}

.summary{
margin-top:20px;
font-weight:bold;
font-size:18px;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">
<span class="menu-btn" onclick="openMenu()">☰</span>
UseALT
</div>

<!-- SIDE MENU -->

<div id="menu" class="side-menu">

<span class="close-btn" onclick="closeMenu()">×</span>

<a href="#">Home</a>
<a href="#">Search</a>
<a href="#">Install Extension</a>
<a href="#">How ALT Works</a>
<a href="#">About</a>

</div>

<!-- HERO -->

<div class="hero">

<h2>Compare prices and delivery across retailers</h2>

<div class="search-container">
<input id="searchInput" type="text" placeholder="Search products (e.g. iPhone 15)">
<button class="search-btn" onclick="searchProduct()">🔍</button>
</div>

<button class="install-btn">Install Extension</button>

</div>

<!-- RESULTS -->

<div class="results">

<h2>Comparison</h2>

<p id="productTitle">Search for a product above</p>

<table id="resultsTable">

<tr>
<th>Retailer</th>
<th>Price</th>
<th>Delivery</th>
</tr>

</table>

<div class="summary" id="summary"></div>

</div>

<script>

/* MENU FUNCTIONS */

function openMenu(){
document.getElementById("menu").style.width="250px";
}

function closeMenu(){
document.getElementById("menu").style.width="0";
}

/* SEARCH DATA */

const products = {

"iphone 15":[
{retailer:"Amazon",price:799,delivery:"Tomorrow"},
{retailer:"Currys",price:789,delivery:"2 days"},
{retailer:"Argos",price:799,delivery:"Today"}
],

"macbook air":[
{retailer:"Amazon",price:999,delivery:"Tomorrow"},
{retailer:"Currys",price:949,delivery:"3 days"},
{retailer:"John Lewis",price:979,delivery:"2 days"}
],

"playstation 5":[
{retailer:"Amazon",price:479,delivery:"Tomorrow"},
{retailer:"Argos",price:469,delivery:"Today"},
{retailer:"Currys",price:479,delivery:"2 days"}
]

};

function searchProduct(){

let query = document.getElementById("searchInput").value.toLowerCase();

let table = document.getElementById("resultsTable");

let summary = document.getElementById("summary");

table.innerHTML = `
<tr>
<th>Retailer</th>
<th>Price</th>
<th>Delivery</th>
</tr>
`;

if(products[query]){

document.getElementById("productTitle").innerText="Product: "+query;

let data = products[query];

let cheapest = data[0];
let fastest = data[0];

data.forEach(item => {

let row = `<tr>
<td>${item.retailer}</td>
<td>£${item.price}</td>
<td>${item.delivery}</td>
</tr>`;

table.innerHTML += row;

if(item.price < cheapest.price) cheapest = item;

if(item.delivery === "Today") fastest = item;

});

summary.innerHTML = `
💰 Cheapest: ${cheapest.retailer} (£${cheapest.price})<br>
⚡ Fastest: ${fastest.retailer}
`;

}

else{

document.getElementById("productTitle").innerText="Product not found";

summary.innerHTML="Try: iPhone 15, MacBook Air, PlayStation 5";

}

}

</script>

</body>
</html>
