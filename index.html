<!DOCTYPE html>
<html>
<head>
<title>UseALT</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f5f5;
text-align:center;
}

.header{
position:fixed;
top:0;
width:100%;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
padding:15px 0;
font-size:28px;
font-weight:bold;
}

.hero{
margin-top:140px;
}

.search-box{
margin-top:20px;
}

input{
width:500px;
padding:16px;
font-size:18px;
border-radius:30px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:14px 30px;
font-size:16px;
border:none;
border-radius:8px;
background:#0077ff;
color:white;
cursor:pointer;
}

table{
margin:auto;
margin-top:50px;
border-collapse:collapse;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

th{
background:#0077ff;
color:white;
padding:15px 25px;
}

td{
padding:15px 25px;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="header">
UseALT
</div>

<div class="hero">

<h2>Compare prices and delivery across retailers</h2>

<div class="search-box">

<input id="productLink" placeholder="Paste product link here">

</div>

<button onclick="searchProduct()">Search</button>

</div>

<table id="resultsTable">

<tr>
<th>Retailer</th>
<th>Price</th>
<th>Delivery</th>
</tr>

</table>

<script>

async function searchProduct(){

let link = document.getElementById("productLink").value;

let response = await fetch("http://localhost:3000/search",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
url:link
})

});

let data = await response.json();

let table = document.getElementById("resultsTable");

table.innerHTML=`
<tr>
<th>Retailer</th>
<th>Price</th>
<th>Delivery</th>
</tr>
`;

data.results.forEach(item => {

let row = `
<tr>
<td>${item.retailer}</td>
<td>£${item.price}</td>
<td>${item.delivery}</td>
</tr>
`;

table.innerHTML += row;

});

}

</script>

</body>

</html>
