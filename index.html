<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALT</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
text-align:center;
}

/* NAVBAR */

.navbar{
background:black;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.menuButton{
font-size:20px;
cursor:pointer;
}

/* SIDE MENU */

.sideMenu{
position:fixed;
top:0;
left:-250px;
width:250px;
height:100%;
background:#111;
color:white;
padding:20px;
transition:0.3s;
}

.sideMenu a{
display:block;
color:white;
padding:10px 0;
text-decoration:none;
}

.closeMenu{
cursor:pointer;
font-size:20px;
}

/* HERO */

.hero{
margin-top:60px;
}

.searchBox{
padding:12px;
width:300px;
font-size:16px;
}

.searchButton{
padding:12px 20px;
background:black;
color:white;
border:none;
cursor:pointer;
}

/* EXTENSION BUTTON */

.extensionButton{
margin-top:30px;
padding:15px 25px;
background:#4CAF50;
color:white;
border:none;
font-size:18px;
cursor:pointer;
}

/* RESULTS */

table{
margin:auto;
margin-top:40px;
border-collapse:collapse;
width:500px;
background:white;
}

th,td{
border:1px solid #ddd;
padding:10px;
}

th{
background:#222;
color:white;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="menuButton" onclick="openMenu()">☰</div>

<h2>ALT</h2>

</div>

<!-- SIDE MENU -->

<div id="sideMenu" class="sideMenu">

<div class="closeMenu" onclick="closeMenu()">✕</div>

<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Extension</a>

</div>

<!-- HERO SECTION -->

<div class="hero">

<h1>Find the Best Price Instantly</h1>

<input id="searchInput" class="searchBox" placeholder="Search product...">

<button class="searchButton" onclick="searchProduct()">Search</button>

<br>

<button class="extensionButton">

Install ALT Extension

</button>

</div>

<!-- RESULTS -->

<table id="resultsTable">

<tr>
<th>Retailer</th>
<th>Price</th>
<th>Delivery</th>
</tr>

</table>

<script>

/* MENU */

function openMenu(){
document.getElementById("sideMenu").style.left="0"
}

function closeMenu(){
document.getElementById("sideMenu").style.left="-250px"
}


/* SEARCH */

async function searchProduct(){

const query=document.getElementById("searchInput").value

const response=await fetch("http://localhost:3000/search",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({product:query})

})

const data=await response.json()

const table=document.getElementById("resultsTable")

table.innerHTML=`

<tr>
<th>Retailer</th>
<th>Price</th>
<th>Delivery</th>
</tr>

`

data.results.forEach(item=>{

table.innerHTML+=`

<tr>
<td>${item.retailer}</td>
<td>£${item.price}</td>
<td>${item.delivery}</td>
</tr>

`

})

}

</script>

</body>
</html>
