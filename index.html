<!DOCTYPE html>
<html>

<head>

<title>UseALT</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
text-align:center;
}

/* HEADER */

.header{
position:fixed;
top:0;
width:100%;
background:white;
padding:20px;
font-size:28px;
font-weight:bold;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
z-index:1000;
}

/* MENU BUTTON */

.menu-btn{
position:absolute;
left:20px;
top:20px;
font-size:28px;
cursor:pointer;
}

/* SIDE MENU */

.side-menu{
height:100%;
width:0;
position:fixed;
top:0;
left:0;
background:#111;
overflow-x:hidden;
transition:0.3s;
padding-top:60px;
}

.side-menu a{
display:block;
color:white;
padding:15px;
text-decoration:none;
font-size:20px;
}

.side-menu a:hover{
background:#333;
}

/* HERO */

.hero{
margin-top:160px;
}

/* SEARCH */

.search-box{
display:flex;
justify-content:center;
margin-top:30px;
}

.search-box input{
width:450px;
padding:15px;
font-size:18px;
border-radius:30px 0 0 30px;
border:1px solid #ccc;
}

.search-btn{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:0 30px 30px 0;
background:#0077ff;
color:white;
cursor:pointer;
}

/* TABLE */

table{
margin:auto;
margin-top:80px;
border-collapse:collapse;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

th{
background:#0077ff;
color:white;
padding:15px 30px;
}

td{
padding:15px 30px;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="header">

<span class="menu-btn" onclick="toggleMenu()">☰</span>

UseALT

</div>

<div id="menu" class="side-menu">

<a href="#">Home</a>
<a href="#">Search</a>
<a href="#">Install Extension</a>
<a href="#">About</a>

</div>

<div class="hero">

<h2>Compare prices and delivery across retailers</h2>

<div class="search-box">

<input id="searchInput" placeholder="Search product e.g. iPhone 15">

<button class="search-btn" onclick="searchProduct()">Search</button>

</div>

</div>

<table id="resultsTable">

<tr>
<th>Retailer</th>
<th>Price</th>
<th>Delivery</th>
</tr>

</table>

<script>

/* MENU */

function toggleMenu(){

let menu=document.getElementById("menu")

if(menu.style.width==="250px"){
menu.style.width="0"
}
else{
menu.style.width="250px"
}

}

/* SEARCH */

async function searchProduct(){

const query=document.getElementById("searchInput").value

const response=await fetch("http://localhost:3000/search",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({product:query})

})

const data=await response.json()

const table=document.getElementById("resultsTable")

table.innerHTML=`
<tr>
<th>Retailer</th>
<th>Price</th>
<th>Delivery</th>
</tr>
`

data.results.forEach(item=>{

table.innerHTML+=`
<tr>
<td>${item.retailer}</td>
<td>£${item.price}</td>
<td>${item.delivery}</td>
</tr>
`

})

}

</script>

</body>
</html>
