<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>ALT - Find the Best Price Instantly</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
margin:0;
background:#ffffff;
color:#000;
}

nav{
background:#000;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
}

.menu a{
color:#fff;
text-decoration:none;
margin-left:20px;
}

.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:40px;
margin-bottom:30px;
}

.search-box{
display:flex;
justify-content:center;
gap:10px;
}

.search-box input{
width:400px;
padding:12px;
font-size:16px;
}

.search-box button{
padding:12px 20px;
background:#000;
color:#fff;
border:none;
cursor:pointer;
}

.extension-btn{
margin-top:25px;
background:#4CAF50;
color:#fff;
padding:15px 25px;
border:none;
font-size:16px;
cursor:pointer;
}

.results{
width:80%;
margin:auto;
margin-top:40px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#000;
color:#fff;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

.deal-btn{
background:#000;
color:#fff;
padding:8px 14px;
text-decoration:none;
}

footer{
background:#000;
color:#fff;
text-align:center;
padding:25px;
margin-top:50px;
}

</style>

</head>

<body>

<nav>

<div class="logo">ALT</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">How It Works</a>
<a href="#">Extension</a>
<a href="#">About</a>
</div>

</nav>

<div class="hero">

<h1>Find the Best Price Instantly</h1>

<div class="search-box">

<input id="searchInput" placeholder="Search product...">

<button onclick="searchProduct()">Search</button>

</div>

<button class="extension-btn">Install ALT Extension</button>

</div>

<div class="results">

<table id="resultsTable">

<tr>
<th>Retailer</th>
<th>Price</th>
<th>Delivery</th>
<th>Deal</th>
</tr>

</table>

</div>

<footer>

© ALT Price Comparison

</footer>

<script>

/* SEARCH */

async function searchProduct(){

const query=document.getElementById("searchInput").value

const response=await fetch("http://localhost:3000/search",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({product:query})

})

const data=await response.json()

const table=document.getElementById("resultsTable")

table.innerHTML=`

<tr>
<th>Retailer</th>
<th>Price</th>
<th>Delivery</th>
<th>Deal</th>
</tr>

`

data.results.forEach(item=>{

table.innerHTML+=`

<tr>

<td>${item.retailer}</td>

<td>£${item.price}</td>

<td>${item.delivery}</td>

<td>
<a class="deal-btn" href="${item.link}" target="_blank">
View Deal
</a>
</td>

</tr>

`

})

}

</script>

</body>
</html>
