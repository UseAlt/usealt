<!DOCTYPE html>
<html>
<head>
<title>UseALT</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f5f5;
text-align:center;
}

/* MENU BUTTON */

.menu-btn{
position:absolute;
left:20px;
top:20px;
font-size:30px;
cursor:pointer;
}

/* SIDE MENU */

.side-menu{
height:100%;
width:0;
position:fixed;
top:0;
left:0;
background:#111;
overflow-x:hidden;
transition:0.3s;
padding-top:60px;
}

/* CLOSE BUTTON */

.close-btn{
position:absolute;
top:15px;
right:25px;
font-size:35px;
cursor:pointer;
color:white;
}

/* MENU LINKS */

.side-menu a{
padding:10px 20px;
text-decoration:none;
font-size:20px;
color:white;
display:block;
}

.side-menu a:hover{
background:#333;
}

/* HEADER */

.header{
padding:30px 0;
font-size:40px;
font-weight:bold;
}

/* HERO */

.hero{
margin-top:120px;
}

input{
width:400px;
padding:15px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:12px 25px;
font-size:16px;
border:none;
border-radius:6px;
background:#0077ff;
color:white;
cursor:pointer;
}

/* RESULTS */

.results{
margin-top:120px;
}

table{
margin:auto;
border-collapse:collapse;
}

td,th{
padding:12px 20px;
border-bottom:1px solid #ddd;
}

.highlight{
margin-top:20px;
font-weight:bold;
}

</style>

</head>

<body>

<!-- MENU BUTTON -->

<span class="menu-btn" onclick="openMenu()">☰</span>

<!-- SIDE MENU -->

<div id="menu" class="side-menu">

<span class="close-btn" onclick="closeMenu()">×</span>

<a href="#">Home</a>
<a href="#">Search</a>
<a href="#">Install Extension</a>
<a href="#">How ALT Works</a>
<a href="#">About</a>

</div>

<!-- HEADER -->

<div class="header">
UseALT
</div>

<!-- HERO -->

<div class="hero">

<input type="text" placeholder="Search for a product">

<p>Compare prices and delivery times across retailers in seconds.</p>

<button>Install Extension</button>

</div>

<!-- RESULTS -->

<div class="results">

<h2>Example comparison</h2>

<p>Product: iPhone 15</p>

<table>

<tr>
<th>Retailer</th>
<th>Price</th>
<th>Delivery</th>
</tr>

<tr>
<td>Amazon</td>
<td>£799</td>
<td>Tomorrow</td>
</tr>

<tr>
<td>Currys</td>
<td>£789</td>
<td>2 days</td>
</tr>

<tr>
<td>Argos</td>
<td>£799</td>
<td>Today</td>
</tr>

</table>

<div class="highlight">
💰 Cheapest: Currys<br>
⚡ Fastest: Argos
</div>

</div>

<script>

function openMenu(){
document.getElementById("menu").style.width="250px";
}

function closeMenu(){
document.getElementById("menu").style.width="0";
}

</script>

</body>

</html>
