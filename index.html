<!DOCTYPE html>
<html>
<head>
<title>UseALT</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f5f5;
text-align:center;
}

/* MENU BUTTON */

.menu-btn{
position:absolute;
left:20px;
top:20px;
font-size:30px;
cursor:pointer;
}

/* SIDE MENU */

.side-menu{
height:100%;
width:0;
position:fixed;
top:0;
left:0;
background:#111;
overflow-x:hidden;
transition:0.3s;
padding-top:60px;
}

.close-btn{
position:absolute;
top:15px;
right:25px;
font-size:35px;
cursor:pointer;
color:white;
}

.side-menu a{
padding:12px 25px;
text-decoration:none;
font-size:20px;
color:white;
display:block;
}

.side-menu a:hover{
background:#333;
}

/* HEADER */

.header{
padding:30px 0;
font-size:42px;
font-weight:bold;
}

/* HERO */

.hero{
margin-top:120px;
}

/* SEARCH BAR */

.search-container{
margin-top:20px;
display:flex;
justify-content:center;
}

.search-container input{
width:500px;
padding:16px;
font-size:18px;
border-radius:30px 0 0 30px;
border:1px solid #ccc;
outline:none;
}

.search-btn{
padding:16px 20px;
font-size:18px;
border:none;
border-radius:0 30px 30px 0;
background:#0077ff;
color:white;
cursor:pointer;
}

/* INSTALL BUTTON */

.install-btn{
margin-top:25px;
padding:14px 30px;
font-size:16px;
border:none;
border-radius:8px;
background:#0077ff;
color:white;
cursor:pointer;
}

/* RESULTS */

.results{
margin-top:120px;
}

.cards{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
margin-top:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
width:200px;
}

.card h3{
margin:5px 0;
}

.badge{
margin-top:10px;
font-weight:bold;
color:#0077ff;
}

.summary{
margin-top:30px;
font-weight:bold;
}

</style>

</head>

<body>

<!-- MENU BUTTON -->

<span class="menu-btn" onclick="openMenu()">☰</span>

<!-- SIDE MENU -->

<div id="menu" class="side-menu">

<span class="close-btn" onclick="closeMenu()">×</span>

<a href="#">Home</a>
<a href="#">Search</a>
<a href="#">Install Extension</a>
<a href="#">How ALT Works</a>
<a href="#">About</a>

</div>

<!-- HEADER -->

<div class="header">
UseALT
</div>

<!-- HERO -->

<div class="hero">

<div class="search-container">
<input type="text" placeholder="Search products (e.g. iPhone 15)">
<button class="search-btn">🔍</button>
</div>

<p>Compare prices and delivery times across retailers in seconds.</p>

<button class="install-btn">Install Extension</button>

</div>

<!-- RESULTS -->

<div class="results">

<h2>Example comparison</h2>

<p>Product: iPhone 15</p>

<div class="cards">

<div class="card">
<h3>Amazon</h3>
<p>£799</p>
<p>Tomorrow</p>
</div>

<div class="card">
<h3>Currys</h3>
<p>£789</p>
<p>2 days</p>
<div class="badge">💰 Cheapest</div>
</div>

<div class="card">
<h3>Argos</h3>
<p>£799</p>
<p>Today</p>
<div class="badge">⚡ Fastest</div>
</div>

</div>

<div class="summary">
💰 Cheapest: Currys<br>
⚡ Fastest: Argos
</div>

</div>

<script>

function openMenu(){
document.getElementById("menu").style.width="250px";
}

function closeMenu(){
document.getElementById("menu").style.width="0";
}

</script>

</body>

</html>
